name: Fly Monitor

on:
  schedule:
    - cron: '*/2 * * * *'
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - run: echo "EVENT=${{ github.event_name }} REF=${{ github.ref }}"

  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check API Health
        run: |
          HEALTH=$(curl -s -m 10 https://api.fly-agent.xyz/v1/health)
          echo "$HEALTH"
          STATUS=$(echo "$HEALTH" | jq -r '.status // "unknown"')
          echo "### Health: $STATUS" >> $GITHUB_STEP_SUMMARY
