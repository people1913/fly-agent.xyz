name: Fly Monitor
on:
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [monitor]
  schedule:
    - cron: "*/5 * * * *"
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: show event
        run: |
          echo "EVENT_NAME=${{ github.event_name }}"
          echo "REF=${{ github.ref }}"
          date
      - name: health probe
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.fly-agent.xyz/v1/health)
          echo "health_status=$HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check failed with status $HTTP_CODE"
            exit 1
          fi
      - name: short-link probe
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://api.fly-agent.xyz/s/test)
          echo "shortlink_status=$HTTP_CODE"

  trend-check:
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: D1 capacity
        run: |
          RESP=$(curl -s https://api.fly-agent.xyz/v1/db/query?type=agents 2>/dev/null || echo '{}')
          echo "d1_probe=ok"
      - name: KV capacity
        run: |
          echo "kv_probe=ok"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [health-check, trend-check]
    if: always() && (needs.health-check.result == 'failure' || needs.trend-check.result == 'failure')
    steps:
      - name: notify
        run: |
          echo "health=${{ needs.health-check.result }} trend=${{ needs.trend-check.result }}"
          echo "::warning::Monitor detected failure"
