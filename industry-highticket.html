<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高客单行业 · Fly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--bg2:#FAFBFC;--bg3:#F1F5F9;--mint:#E8F5EC;--mint-border:#B8DCC5;--deep-green:#1A3D2E;--dark:#0F172A;--text2:#1E293B;--text3:#64748B;--text4:#94A3B8;--mono:'JetBrains Mono',monospace;--sans:'Inter','Noto Sans SC',sans-serif;--border:#E2E8F0;--nav-w:220px;--nav-w-c:60px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--dark);display:flex}
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:700;letter-spacing:-.3px}
.topbar .tag{font-size:11px;font-weight:600;color:var(--deep-green);background:var(--mint);padding:2px 10px;border-radius:10px}
/* 折叠侧边栏 */

.chart-row{display:flex;gap:12px;margin-bottom:24px}
.mini-chart{flex:1;background:var(--bg);border:1px solid var(--mint-border);border-radius:8px;padding:16px;text-align:center}
.mini-chart .num{font-size:22px;font-weight:800;color:var(--deep-green)}
.mini-chart .lbl{font-size:10px;color:var(--text4);margin-top:4px}
.card{background:var(--bg);border:1px solid var(--mint-border);border-radius:8px;padding:14px;margin-top:8px;font-family:var(--mono);font-size:12px;line-height:2}
.card .lb{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;font-family:var(--sans);margin-bottom:4px}
.card .row{display:flex;align-items:center;gap:6px;font-size:13px;line-height:2}
/* Signal Flow Page */
.axiom-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:16px 20px;margin-bottom:24px}
.axiom-box .axiom-label{font-size:10px;font-weight:700;color:#DC2626;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.axiom-box .axiom-text{font-size:16px;font-weight:800;color:#991B1B;line-height:1.6}
.def-box{background:var(--mint);border:1px solid var(--mint-border);border-radius:8px;padding:16px 20px;margin-bottom:24px}
.def-box .def-label{font-size:10px;font-weight:700;color:var(--deep-green);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.def-box .def-text{font-size:15px;font-weight:700;color:var(--deep-green);line-height:1.6}
.def-box .def-sub{font-size:12px;color:#2D6A4F;margin-top:6px;line-height:1.5}
.vs-row{display:flex;gap:16px;margin-bottom:24px}
.vs-col{flex:1;border-radius:8px;padding:14px}
.vs-col.wrong{background:#FEF2F2;border:1px solid #FECACA}
.vs-col.right{background:var(--mint);border:1px solid var(--mint-border)}
.vs-col .vs-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.vs-col.wrong .vs-title{color:#DC2626}
.vs-col.right .vs-title{color:var(--deep-green)}
.vs-col .vs-item{font-size:12px;line-height:2}
.vs-col.wrong .vs-item{color:#991B1B;text-decoration:line-through}
.vs-col.right .vs-item{color:var(--deep-green);font-weight:600}
.flow-pipeline{display:flex;flex-direction:column;gap:0;margin-bottom:24px}
.flow-step{display:flex;align-items:stretch;gap:0}
.flow-step-num{width:36px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.flow-step-num .circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.flow-step-num .line{flex:1;width:2px;margin-top:2px}
.flow-step-body{flex:1;padding-bottom:16px;padding-left:8px}
.flow-step-body h3{font-size:13px;font-weight:700;margin-bottom:2px}
.flow-step-body p{font-size:12px;color:var(--text3);line-height:1.6}
.gate-card{background:var(--bg2);border:2px solid var(--deep-green);border-radius:8px;padding:16px;margin-bottom:16px;position:relative}
.gate-card .gate-badge{position:absolute;top:-10px;left:12px;background:var(--deep-green);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.gate-card .gate-row{display:flex;align-items:center;gap:8px;font-size:13px;line-height:1.8;font-family:var(--mono)}
.gate-card .gate-claim{color:var(--text3);text-decoration:line-through}
.gate-card .gate-ok{color:var(--deep-green);font-weight:700}
</style>
</head>
<body>
<script src="/nav-shared.js?v=20260616f"></script>

<div class="chart-row" style="margin-bottom:24px"><div class="mini-chart"><div class="num">567/日</div><div class="lbl">验证请求</div></div><div class="mini-chart"><div class="num">98.2%</div><div class="lbl">通过率</div></div><div class="mini-chart"><div class="num">43件/日</div><div class="lbl">防刷拦截</div></div><div class="mini-chart"><div class="num">¥86.5万/月</div><div class="lbl">佣金保障</div></div></div>
<div class="card" style="margin-bottom:24px"><div class="lb">归因链路</div><div class="row" style="font-family:var(--mono);font-size:13px;color:var(--deep-green);letter-spacing:0.5px">AI推荐 → 深度咨询 → 方案确认 → 成交 → 佣金结算</div></div>
<div class="card"><div class="lb">大额归因</div><div class="row">追踪高客单AI推荐→深度咨询→成交→佣金的完整链路</div></div><div class="card"><div class="lb">链路完整性</div><div class="row">确保长链路每个节点可验证，防止归因断裂</div></div><div class="card"><div class="lb">风险控制</div><div class="row">大额佣金结算前的多重验证与风险控制</div></div>
</div>
</div>

</body>
</html>
