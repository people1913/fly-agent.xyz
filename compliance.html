<style>:root{--bg:#fff,--bg2:#FAFBFC;--bg3:#F1F5F9;--mint:#E8F5EC;--mint-border:#B8DCC5;--deep-green:#1A3D2E;--dark:#0F172A;--text2:#1E293B;--text3:#64748B;--text4:#94A3B8;--mono:'JetBrains Mono',monospace;--sans:'Inter','Noto Sans SC',sans-serif;--border:#E2E8F0;--nav-w:220px;--nav-w-c:60px}
*{margin:0;padding:0;box-sizing:border-box}html,body{min-height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--dark);display:flex}
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:700;letter-spacing:-.3px}
.topbar .tag{font-size:11px;font-weight:600;color:var(--deep-green);background:var(--mint);padding:2px 10px;border-radius:10px}
.content{padding:32px;overflow-y:auto}
.hero{text-align:center;padding:40px 24px 24px}
.hero .en{font-size:28px;font-weight:800;color:var(--deep-green);margin-bottom:4px}
.hero .zh{font-size:16px;color:var(--text3)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:32px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px;transition:all .2s}
.card:hover{border-color:var(--deep-green);box-shadow:0 2px 8px rgba(26,61,46,.08)}
.card-icon{width:40px;height:40px;background:var(--mint);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.card-icon svg{width:20px;height:20px;stroke:var(--deep-green);fill:none;stroke-width:2}
.card-title{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:8px}
.card-desc{font-size:14px;color:var(--text3);line-height:1.6}
.card-link{display:inline-block;margin-top:12px;font-size:13px;color:var(--deep-green);font-weight:600;text-decoration:none}
.card-link:hover{text-decoration:underline}</style>
