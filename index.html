<style>
:root{
--bg:#FFFFFF;--bg2:#FAFBFC;--bg3:#F4F6F8;--bg4:#E8ECF0;
--blue:#2563EB;--blue-light:#60A5FA;--mint:#E8F5EC;--mint-border:#B8DCC5;--deep-green:#1A3D2E;--tan:#64748B;--tan-light:#94A3B8;
--dark:#0F172A;--text:#0F172A;--text2:#1E293B;--text3:#2563EB;--text4:#60A5FA;
--mono:'JetBrains Mono',monospace;--sans:'Inter','Noto Sans SC',sans-serif;
--border:#E2E8F0;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;font-size:16px}
a{color:var(--blue);text-decoration:none;transition:opacity .2s}
a:hover{opacity:.8}

/* NAV */
header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
header .container{display:flex;justify-content:space-between;align-items:center;height:56px}
.logo{font-family:var(--sans);font-size:18px;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:6px;letter-spacing:-0.5px}
.logo b{color:#0F172A;font-size:35px;font-weight:700;font-family:var(--sans)}.logo-sub{color:#0F172A;font-size:18px;font-weight:700;margin-left:4px;letter-spacing:-0.5px}
nav{display:flex;align-items:center;gap:20px}
nav a{font-size:13px;color:var(--text2);transition:color .15s;letter-spacing:.3px;font-weight:500}
nav a:hover{color:var(--dark)}
.nav-cta{padding:8px 18px;background:var(--deep-green);color:#E8F5EC;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:var(--sans)}
.nav-cta:hover{opacity:.85}

.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.sec-label{font-family:var(--mono);font-size:11px;color:var(--tan);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.sec-title{font-size:28px;font-weight:700;line-height:1.3;margin-bottom:6px;letter-spacing:-.5px;color:var(--dark)}
.sec-desc{font-size:14px;color:var(--text2);margin-bottom:28px;max-width:560px}

/* HERO */
.hero{padding:80px 0 60px}
.hero .container{display:flex;flex-direction:column;align-items:center;text-align:center;max-width:720px;margin:0 auto}
.hero h1{font-size:30px;font-weight:800;line-height:1.1;letter-spacing:-1.5px;color:var(--dark);margin-bottom:16px}
.hero h1 em{font-style:normal;color:var(--blue)}
.hero-tagline{font-size:20px;font-family:var(--sans);font-weight:800;color:var(--blue);margin:0 0 12px 0;letter-spacing:-1px;line-height:1.2}
.hero-label{font-size:24px;font-family:var(--sans);color:#94A3B8;font-weight:400;letter-spacing:-1px;margin:0 0 12px 0;line-height:1.2}
.hero-pain{font-size:44px;font-weight:800;color:#0F172A;letter-spacing:-1px;line-height:1.2;margin:0 0 12px 0;font-family:var(--sans)}
.hero-trust{margin:0 0 12px 0;font-size:15px;color:#94A3B8;font-weight:500}
.hero-trust .dot{color:#CBD5E1;margin:0 1px}
.hero-btns{display:flex;gap:32px;margin:0;flex-wrap:wrap;justify-content:center}
.btn-p{padding:8px 18px;background:var(--deep-green);color:#E8F5EC;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:var(--sans)}
.btn-p:hover{opacity:.85}
.btn-s{padding:8px 18px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.btn-s:hover{border-color:var(--text3);color:var(--dark)}

/* PROBLEM */
.problem-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:24px;font-size:14px;color:var(--text2)}
.problem-flow .node{padding:6px 16px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:500}
.problem-flow .arrow{color:var(--blue);font-weight:600}
.problem-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.problem-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:24px}
.problem-card .num{font-family:var(--mono);font-size:11px;color:var(--blue);margin-bottom:10px}
.problem-card h3{font-size:14px;font-weight:600;margin-bottom:6px;color:var(--dark)}
.problem-card p{font-size:13px;color:var(--text2);line-height:1.6}

/* ARCHITECTURE SIMPLIFIED */
.arch-layers{max-width:720px}
.arch-layer{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:4px}
.arch-ico{font-size:18px;min-width:24px;text-align:center}
.arch-lname{font-size:14px;font-weight:600;color:var(--dark)}
.arch-value{font-size:12px;color:var(--text2)}
.arch-arrow{padding:2px 0 2px 30px;display:flex;align-items:center;gap:8px;color:var(--blue);font-size:11px;font-family:var(--mono)}

/* PROTOCOL */
.proto-steps{max-width:720px}
.proto-step{display:flex;gap:16px;margin-bottom:20px;padding:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.proto-num{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--blue);min-width:32px}
.proto-content h3{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:4px}
.proto-content p{font-size:13px;color:var(--text2);line-height:1.7}

/* SIGNAL FLOW */
.attribution-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}
.attribution-flow .step{text-align:center;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;min-width:80px}
.attribution-flow .step .label{font-size:13px;font-weight:600;color:var(--dark)}
.attribution-flow .step .detail{font-size:11px;color:var(--text2);margin-top:4px}
.attribution-flow .arrow{color:var(--blue);font-weight:700;font-size:16px}

/* GEO COMPARE */
.geo-compare{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.geo-card{padding:24px;border-radius:10px;background:var(--bg)}
.geo-card.fly{border:2px solid var(--blue)}
.geo-card.trad{border:1px solid var(--border)}
.geo-card h3{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:12px}
.geo-card .line{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:6px}
.geo-card .bad{color:#DC2626;font-weight:600}
.geo-card .good{color:var(--blue);font-weight:600}

/* PRICING */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:28px}
.price-card{padding:28px 24px;border:1px solid var(--border);border-radius:12px;background:var(--bg)}
.price-card.featured{border:2px solid var(--blue);position:relative}
.price-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:2px 12px;background:var(--blue);color:#fff;font-size:11px;border-radius:20px;font-weight:600}
.price-tier{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:1px;margin-bottom:8px}
.price-amount{font-size:32px;font-weight:700;color:var(--dark);margin-bottom:4px}
.price-amount span{font-size:14px;font-weight:400;color:var(--text2)}
.price-extra{font-size:12px;color:var(--text2);margin-bottom:16px}
.price-features{list-style:none;font-size:13px;color:var(--text2);line-height:2;margin-bottom:20px;padding:0}
.price-btn{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:var(--sans)}
.price-btn:hover{opacity:.85}
.price-btn.blue{background:var(--blue)}

/* COMPLIANCE MINI */
.compliance-mini{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px}
.compliance-box{padding:20px;border:1px solid var(--border);border-radius:8px;background:var(--bg)}
.compliance-box h4{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:8px}
.compliance-box .item{font-size:12px;color:var(--text2);font-family:var(--mono);line-height:1.8}
.compliance-bad{color:#DC2626;font-weight:600}

/* FAQ COMPACT */
.faq-list{max-width:720px;margin-top:24px}
.faq-item{border-bottom:1px solid var(--border);padding:0}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:16px 0;cursor:pointer;font-size:14px;font-weight:500;color:var(--dark)}
.faq-q:hover{color:var(--blue)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s;font-size:13px;color:var(--text2);line-height:1.8}
.faq-item.open .faq-a{max-height:200px;padding-bottom:16px}
.faq-item .pm{font-size:18px;color:var(--text2);transition:transform .2s}
.faq-item.open .pm{transform:rotate(45deg)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:40px 0 24px;background:var(--bg2)}
.footer-grid{display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;margin-bottom:24px}
.footer-brand{font-size:14px;color:var(--dark);font-weight:600;max-width:400px}
.footer-brand span{font-weight:400;font-size:11px;color:var(--text2)}
.footer-links{display:flex;flex-wrap:wrap;gap:16px}
.footer-links a{font-size:13px;color:var(--text2)}
.footer-links a:hover{color:var(--dark)}
.footer-copy{font-size:11px;color:var(--text2);border-top:1px solid var(--border);padding-top:16px}

/* VERIFY MODAL */
.verify-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.verify-overlay.show{display:flex}
.verify-card{background:#fff;border-radius:16px;padding:32px;max-width:460px;width:90%;max-height:85vh;overflow-y:auto;position:relative}
.verify-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;color:var(--text2);cursor:pointer}
.verify-close:hover{color:var(--dark)}
.verify-field{margin-bottom:14px}
.verify-field label{display:block;font-size:12px;font-weight:600;color:var(--dark);margin-bottom:4px}
.verify-field input,.verify-field select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--sans);outline:none;transition:border .15s}
.verify-field input:focus,.verify-field select:focus{border-color:var(--blue)}
.verify-submit{width:100%;padding:10px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:8px}
.verify-submit:hover{opacity:.85}

/* OVERLAY */
.legal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.legal-overlay.show{display:flex}
.legal-card{background:#fff;border-radius:16px;padding:40px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto}
.legal-card h2{font-size:20px;font-weight:700;color:var(--dark);margin-bottom:16px}
.legal-card h3{font-size:14px;font-weight:600;color:var(--dark);margin:16px 0 8px}
.legal-card p{font-size:13px;color:var(--text2);line-height:1.8}
.legal-close{margin-top:24px;padding:10px 24px;background:var(--dark);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:var(--sans)}

/* SANDBOX TAG */
.sandbox-tag{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:8px;border:1px solid var(--border)}

/* RESPONSIVE */
@media(max-width:768px){
.hero-label{font-size:16px}.hero-pain{font-size:36px}.hero-tagline{font-size:16px}
.problem-grid{grid-template-columns:1fr}
.price-grid{grid-template-columns:1fr}
.compliance-mini{grid-template-columns:1fr}
.geo-compare{grid-template-columns:1fr}
nav{gap:12px}nav a{font-size:12px}
}

/* ========== Fly自建聊天面板 ========== */
.fly-chat-panel{position:fixed;top:0;right:0;width:420px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:99999;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;pointer-events:auto}
.fly-chat-panel.open{transform:translateX(0)}
.fly-chat-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid #E2E8F0;flex-shrink:0}
.fly-chat-close{margin-left:auto;background:none;border:none;font-size:18px;color:#94A3B8;cursor:pointer;padding:4px 8px;border-radius:6px}
.fly-chat-close:hover{background:#F1F5F9;color:#0F172A}
.fly-chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.fly-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.7;word-break:break-word}
.fly-msg-user{align-self:flex-end;background:#2563EB;color:#fff;border-bottom-right-radius:4px}
.fly-msg-bot{align-self:flex-start;background:#F1F5F9;color:#0F172A;border-bottom-left-radius:4px}
.fly-chat-input-bar{display:flex;padding:12px 16px;border-top:1px solid #E2E8F0;gap:8px;flex-shrink:0}
.fly-chat-input-bar input{flex:1;border:1px solid #E2E8F0;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s}
.fly-chat-input-bar input:focus{border-color:#2563EB}
.fly-chat-input-bar button{background:#2563EB;color:#fff;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;font-size:16px;transition:background .2s}
.fly-chat-input-bar button:hover{background:#1D4ED8}
@media(max-width:768px){.fly-chat-panel{width:100%}}

</style>

</head>
<body>
<!-- NAV -->
<header>
<div class="container">
<div class="logo"><span style="font-family:var(--sans);font-size:18px;font-weight:700;color:#0F172A;letter-spacing:-0.5px">Fly</span><span class="logo-sub"> · 商业信任协议 · AI 归因验证</span></div>
<nav>
<a href="/verify" class="nav-cta" style="text-decoration:none;background:var(--deep-green);color:#E8F5EC">溯源 Fly</a>
</nav>
</div>
</header>

<!-- ===== SECTION 1: HERO ===== -->
<section class="hero" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:120px 0 60px">
<div class="container" style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:0">

<!-- 第一层：痛点 -->
<div style="margin-bottom:14px">
<div style="font-size:52px;font-weight:800;color:#0F172A;letter-spacing:-1px;line-height:1.2;margin-bottom:4px">商业价值正在被创造</div>
<div style="font-size:40px;font-weight:800;color:#94A3B8;letter-spacing:-1px;line-height:1.25;margin-bottom:10px"><span style="color:#94A3B8">但没有人能</span><span style="color:#0F172A">完整证明</span><span style="color:#94A3B8">这份价值属于谁</span></div>
<div style="font-size:18px;color:#64748B;letter-spacing:-0.5px;line-height:1.6;margin-bottom:0">Fly 让每一次 Agent 协作有迹可循、有据可证、有账可算</div>
<div style="font-size:18px;color:#64748B;letter-spacing:-0.5px;line-height:1.6;margin-bottom:10px">让商业价值，可归因、可信任、可结算</div>
<!-- 流程图：追踪/信任/结算的对比 -->
<div style="display:flex;flex-direction:column;gap:20px;margin-top:24px;width:100%;align-items:center">
<!-- 追踪行 -->
<div style="display:flex;align-items:center;justify-content:center;gap:0">
<div style="width:75px;height:75px;border-radius:50%;background:#F0F7F0;border:2px dashed #1A3D2E;color:#1A3D2E;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">Agent 协作</div>
<svg width="100" height="30"><line x1="0" y1="15" x2="90" y2="15" stroke="#1A3D2E" stroke-width="2" stroke-dasharray="5,3"/><polygon points="90,10 100,15 90,20" fill="#1A3D2E"/><text x="50" y="10" text-anchor="middle" font-size="10" fill="#1A3D2E" font-weight="700">没有Fly</text></svg>
<div style="width:75px;height:75px;border-radius:50%;background:#1A3D2E;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">不可追踪</div>
<svg width="100" height="30"><line x1="0" y1="15" x2="90" y2="15" stroke="#1A3D2E" stroke-width="2"/><polygon points="90,10 100,15 90,20" fill="#1A3D2E"/><text x="50" y="10" text-anchor="middle" font-size="10" fill="#1A3D2E" font-weight="700">有Fly</text></svg>
<div style="width:75px;height:75px;border-radius:50%;background:#F0F7F0;border:2px solid #1A3D2E;color:#1A3D2E;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">可追踪</div>
</div>
<!-- 信任行 -->
<div style="display:flex;align-items:center;justify-content:center;gap:0">
<div style="width:75px;height:75px;border-radius:50%;background:#F0F7F0;border:2px dashed #1A3D2E;color:#1A3D2E;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">商业事实</div>
<svg width="100" height="30"><line x1="0" y1="15" x2="90" y2="15" stroke="#1A3D2E" stroke-width="2" stroke-dasharray="5,3"/><polygon points="90,10 100,15 90,20" fill="#1A3D2E"/><text x="50" y="10" text-anchor="middle" font-size="10" fill="#1A3D2E" font-weight="700">没有Fly</text></svg>
<div style="width:75px;height:75px;border-radius:50%;background:#1A3D2E;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">不可信任</div>
<svg width="100" height="30"><line x1="0" y1="15" x2="90" y2="15" stroke="#1A3D2E" stroke-width="2"/><polygon points="90,10 100,15 90,20" fill="#1A3D2E"/><text x="50" y="10" text-anchor="middle" font-size="10" fill="#1A3D2E" font-weight="700">有Fly</text></svg>
<div style="width:75px;height:75px;border-radius:50%;background:#F0F7F0;border:2px solid #1A3D2E;color:#1A3D2E;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">可信任</div>
</div>
<!-- 结算行 -->
