name = "fly-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "FLY_D1"
database_name = "fly-db"
database_id = "71a75dc8-76c5-4563-bf6f-0aa47f76ff95"

# KV Namespace（短链限流用）
[[kv_namespaces]]
binding = "FLY_KV"
id = "fea93561708c4272886554d83e546922"

# 环境变量
[vars]

# Custom Domain Route
routes = [
  { pattern = "api.fly-agent.xyz/*", zone_name = "fly-agent.xyz" }
]

# Cron Trigger — 每分钟检查待验证的Deploy
[triggers]
crons = ["*/5 * * * *"]