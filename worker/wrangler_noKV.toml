# 2026-07-20 安全清洗：真实密钥已移除，待用户轮换
# 部署前执行: wrangler secret put IP_SALT && wrangler secret put API_KEYS
name = "fly-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "FLY_D1"
database_name = "fly-db"
database_id = "71a75dc8-76c5-4563-bf6f-0aa47f76ff95"

[vars]
IP_SALT = "REPLACE_VIA_WRANGLER_SECRET"
API_KEYS = "REPLACE_VIA_WRANGLER_SECRET"

routes = [
  { pattern = "api.fly-agent.xyz/*", zone_name = "fly-agent.xyz" }
]
